services:
  - type: web
    name: zohar-yachad
    runtime: node
    buildCommand: npm install && npm run build && npx drizzle-kit push
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: zohar-data
      mountPath: /opt/render/project/src
      sizeGB: 1
